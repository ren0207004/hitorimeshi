<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ひとりめし">
  <title>ひとりめし</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #FF6B35;
      --bg: #0F0E0C;
      --surface: #1A1916;
      --card: #232220;
      --text: #F5F0E8;
      --muted: #6B6760;
      --green: #4CAF7D;
      --red: #FF5555;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orb */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,53,0.08) 0%, transparent 70%);
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 0;
    }

    .login-wrapper {
      width: 100%;
      max-width: 380px;
      padding: 40px 24px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-8px); }
      40%,80% { transform: translateX(8px); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .logo {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo-icon {
      font-size: 40px;
      margin-bottom: 12px;
      display: block;
    }

    .logo h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1;
    }

    .logo h1 span {
      color: var(--accent);
    }

    .logo p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--surface);
      border: 1px solid #2E2D2B;
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 16px;
      font-family: 'Noto Sans JP', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    input:focus {
      border-color: var(--accent);
    }

    input::placeholder {
      color: #3A3835;
    }

    .btn-login {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      letter-spacing: 0.5px;
      cursor: pointer;
      margin-top: 24px;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-appearance: none;
    }

    .btn-login:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .btn-login:disabled {
      background: #2A2927;
      color: var(--muted);
      cursor: not-allowed;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .error-msg {
      background: rgba(255,85,85,0.1);
      border: 1px solid rgba(255,85,85,0.3);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--red);
      font-family: 'Noto Sans JP', sans-serif;
      margin-top: 16px;
      line-height: 1.5;
      animation: shake 0.4s ease;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    /* ===== APP SCREEN (after login) ===== */
    #app-screen {
      display: none;
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding-bottom: 80px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.4s ease forwards;
    }

    #app-screen.visible {
      display: block;
    }

    .app-header {
      padding: 20px 20px 14px;
      border-bottom: 1px solid #2A2927;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .app-logo {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .app-logo span:first-child {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--accent);
    }

    .app-logo span:last-child {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .btn-logout {
      background: #1a1a1a;
      border: 1px solid #2E2D2B;
      border-radius: 8px;
      padding: 6px 12px;
      color: var(--muted);
      font-size: 11px;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: color 0.2s;
    }

    .btn-logout:hover {
      color: var(--red);
      border-color: var(--red);
    }

    .app-content {
      padding: 40px 24px;
      text-align: center;
    }

    .welcome-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .welcome-text {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .welcome-sub {
      font-size: 13px;
      color: var(--muted);
      font-family: 'Noto Sans JP', sans-serif;
      line-height: 1.8;
    }

    .user-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid #2E2D2B;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--muted);
      font-family: 'Noto Sans JP', sans-serif;
      margin-top: 20px;
    }

    .user-badge::before {
      content: '●';
      color: var(--green);
      font-size: 8px;
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div class="login-wrapper" id="login-screen">
    <div class="logo">
      <span class="logo-icon">🍳</span>
      <h1><span>ひとり</span>めし</h1>
      <p>1人分レシピ &amp; 冷蔵庫管理</p>
    </div>

    <div class="form-group">
      <label for="email">メールアドレス</label>
      <input type="email" id="email" placeholder="example@mail.com" autocomplete="email" inputmode="email">
    </div>

    <div class="form-group">
      <label for="password">パスワード</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="btn-login" onclick="doLogin()">
      ログイン
    </button>

    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- App Screen (shown after login) -->
  <div id="app-screen">
    <div class="app-header">
      <div class="app-logo">
        <span>ひとり</span>
        <span>めし</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">ログアウト</button>
    </div>
    <div class="app-content">
      <div class="welcome-icon">🎉</div>
      <p class="welcome-text">ログイン成功！</p>
      <p class="welcome-sub">ここにアプリの機能が入ります。<br>次のステップでレシピ機能を追加します。</p>
      <div class="user-badge" id="user-badge">読み込み中…</div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD09A_IUArbdXZO6F9DutJigFOi9hpxBa0",
      authDomain: "hitorimeshi-a.firebaseapp.com",
      projectId: "hitorimeshi-a",
      storageBucket: "hitorimeshi-a.firebasestorage.app",
      messagingSenderId: "289020471546",
      appId: "1:289020471546:web:320a8bfe43ba42a1738143"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Auth state observer
    onAuthStateChanged(auth, (user) => {
      if (user) {
        showApp(user);
      } else {
        showLogin();
      }
    });

    function showApp(user) {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("app-screen").classList.add("visible");
      document.getElementById("user-badge").textContent = user.email;
    }

    function showLogin() {
      document.getElementById("login-screen").style.display = "block";
      document.getElementById("app-screen").classList.remove("visible");
    }

    // Login
    window.doLogin = async function() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn = document.getElementById("btn-login");
      const errEl = document.getElementById("error-msg");

      if (!email || !password) {
        showError("メールアドレスとパスワードを入力してください");
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>ログイン中…';
      errEl.classList.remove("show");

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (e) {
        btn.disabled = false;
        btn.innerHTML = 'ログイン';
        const msg = getErrorMessage(e.code);
        showError(msg);
      }
    };

    // Logout
    window.doLogout = async function() {
      await signOut(auth);
    };

    function showError(msg) {
      const el = document.getElementById("error-msg");
      el.textContent = msg;
      el.classList.remove("show");
      void el.offsetWidth; // reflow for re-animation
      el.classList.add("show");
    }

    function getErrorMessage(code) {
      switch(code) {
        case "auth/invalid-email":         return "メールアドレスの形式が正しくありません";
        case "auth/user-not-found":        return "このメールアドレスは登録されていません";
        case "auth/wrong-password":        return "パスワードが間違っています";
        case "auth/invalid-credential":    return "メールアドレスまたはパスワードが間違っています";
        case "auth/too-many-requests":     return "ログイン試行が多すぎます。しばらく待ってください";
        case "auth/network-request-failed":return "ネットワークエラーです。通信環境を確認してください";
        default:                           return "ログインに失敗しました（" + code + "）";
      }
    }

    // Enter key support
    document.getElementById("password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") window.doLogin();
    });
    document.getElementById("email").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("password").focus();
    });
  </script>
</body>
</html>
